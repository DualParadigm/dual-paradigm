<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<!-- 在 GitHub Pages 子路径下修正相对路径，避免与 localhost 表现不一致 -->
	<script>
		(function() {
			if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;
			var path = location.pathname;
			var base = path.endsWith('/') ? path : path.replace(/\/?$/, '/');
			document.write('<base href="' + base + '">');
		})();
	</script>
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="">
	<meta name="author" content="">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
	<title>Situated Visualization Design Space</title>

	<link href="css/bootstrap.min.css" rel="stylesheet">


	<link href="css/jquery-ui.min.css" rel="stylesheet">

	<!-- idvx_ styles for this template -->
	<link href="css/idvx_style.css" rel="stylesheet">
	<!-- ArtisticVis 风格布局与卡片 -->
	<link href="css/situvis.css" rel="stylesheet">

	<script src="js/ie-emulation-modes-warning.js"></script>

	<script src="js/jquery.min.js"></script>
	<script src="js/jquery.cookie.js"></script>

	<script type="text/javascript" src="js/jquery-ui.min.js"></script>

</head>

<body>
	<!-- ArtisticVis 风格：顶部横幅（p5 画布作为背景，原图已隐藏） -->
	<header class="situvis-banner">
		<div class="situvis-banner-bg" id="banner-canvas-container"></div>
		<h1 class="situvis-banner-title">Designing Situated Visualization: A Dual Perspectives Paradigm</h1>
		<p class="situvis-banner-desc">Toward coherent and complementary interdisciplinary practice</p>
	</header>

	<!-- 索引切换条：Cases / Guidance -->
	<nav class="situvis-nav">
		<div class="situvis-nav-inner">
			<a href="#" class="situvis-nav-item active" data-page="cases">cases</a>
			<a href="#" class="situvis-nav-item" data-page="guidance">guidance</a>
		</div>
	</nav>

	<!-- 竖版布局：左侧固定筛选栏 + 右侧主内容（Cases 页） -->
	<div id="page-cases" class="situvis-page-wrap">
	<div class="situvis-page">
		<aside class="situvis-sidebar">
			<!-- 搜索 -->
			<div class="situvis-filter-block">
				<label for="input-searchBar" class="situvis-filter-label">Search</label>
				<div class="situvis-search-wrap">
					<span id="magnify" class="situvis-search-icon"></span>
					<input type="text" id="input-searchBar" class="situvis-search-input" placeholder="Search title">
					<button type="button" id="idvx-searchBar-button"
						class="situvis-search-btn idvx-searchBar-button">Search</button>
				</div>
				<span id="idvx-searchBar-relativeNum" class="situvis-filter-count">0</span>
			</div>
			<!-- 年份筛选（数据有 years 时生效） -->
			<div class="situvis-filter-block idvx-timeFilter-relativeNum">
				<label class="situvis-filter-label">Filter by Year</label>
				<div id="timeFilter" class="idvx-timeFilter-components"></div>
				<div class="idvx-timeFilter-container">
					<span id="left_Num" class="idvx-left-relativeNum">1996</span>
					<span id="right_Num" class="idvx-right-relativeNum">2022</span>
				</div>
			</div>
		
			<div id="bottom-filterPanel" class="panel panel-default idvx-panel">
				<div id="idvx-task" class="panel-body idvx-panel-contentPadding situvis-filter-scroll">
					<div class="situvis-tree">
						<section class="situvis-tree-node is-open situvis-tree-root--design" data-tree-node>
							<button type="button" class="situvis-tree-toggle" data-tree-toggle aria-expanded="true">
								<span class="situvis-tree-label">Design</span>
							</button>
							<div class="situvis-tree-children" data-tree-children>
								<section class="situvis-tree-node is-open" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="true">
										<span class="situvis-tree-label">Design Goal</span>
									</button>
									<div class="situvis-tree-children" data-tree-children>
										<div class="panel-body idvx-Goal-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="presentation-one" type="button" name="comprehension" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="comprehension"><input type="checkbox" autocomplete="off"></button>
												<button id="presentation-two" type="button" name="communication" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="communication"><input type="checkbox" autocomplete="off"></button>
												<button id="presentation-3" type="button" name="archive" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="archive"><input type="checkbox" autocomplete="off"></button>
												<button id="presentation-4" type="button" name="engagement" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="engagement"><input type="checkbox" autocomplete="off"></button>
												<button id="presentation-5" type="button" name="reflection" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="reflection"><input type="checkbox" autocomplete="off"></button>
												<button id="presentation-6" type="button" name="analysis" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="analysis"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>

								<section class="situvis-tree-node" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="false">
										<span class="situvis-tree-label">Audience</span>
									</button>
									<div class="situvis-tree-children" data-tree-children hidden>
										<div class="panel-body idvx-User-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="four-one" type="button" name="Individual" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Individual"><input type="checkbox" autocomplete="off"></button>
												<button id="four-two" type="button" name="Group" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Group"><input type="checkbox" autocomplete="off"></button>
												<button id="four-three" type="button" name="Public" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Public"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>
							</div>
						</section>

						<section class="situvis-tree-node situvis-tree-root--presentation" data-tree-node>
							<button type="button" class="situvis-tree-toggle" data-tree-toggle aria-expanded="false">
								<span class="situvis-tree-label">Presentation</span>
							</button>
							<div class="situvis-tree-children" data-tree-children hidden>
								<div class="panel-body idvx-Presentation-panelBody situvis-tree-leaf">
									<div class="idvx-collapsed-container">
										<button id="Seven-one" type="button" name="XR" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="XR"><input type="checkbox" autocomplete="off"></button>
										<button id="Seven-two" type="button" name="Event" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Event"><input type="checkbox" autocomplete="off"></button>
										<button id="Seven-three" type="button" name="Artifact" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Artifact"><input type="checkbox" autocomplete="off"></button>
										<button id="Seven-four" type="button" name="Installation" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Installation"><input type="checkbox" autocomplete="off"></button>
									</div>
								</div>
							</div>
						</section>

						<section class="situvis-tree-node situvis-tree-root--representation" data-tree-node>
							<button type="button" class="situvis-tree-toggle" data-tree-toggle aria-expanded="false">
								<span class="situvis-tree-label">Representation</span>
							</button>
							<div class="situvis-tree-children" data-tree-children hidden>
								<section class="situvis-tree-node" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="false">
										<span class="situvis-tree-label">Perceptual Form</span>
									</button>
									<div class="situvis-tree-children" data-tree-children hidden>
										<div class="panel-body idvx-representationForm-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="rf-one" type="button" name="visual" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="visual"><input type="checkbox" autocomplete="off"></button>
												<button id="rf-two" type="button" name="haptic" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="haptic"><input type="checkbox" autocomplete="off"></button>
												<button id="rf-3" type="button" name="sound" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="sound"><input type="checkbox" autocomplete="off"></button>
												<button id="rf-4" type="button" name="other (taste, smell)" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="other (taste, smell)"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>

								<section class="situvis-tree-node" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="false">
										<span class="situvis-tree-label">Situatedness</span>
									</button>
									<div class="situvis-tree-children" data-tree-children hidden>
										<div class="situvis-tree-meta-label">Scale</div>
										<div class="panel-body idvx-SituatednessScale-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="situ-scale-one" type="button" name="small" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="small"><input type="checkbox" autocomplete="off"></button>
												<button id="situ-scale-two" type="button" name="medium" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="medium"><input type="checkbox" autocomplete="off"></button>
												<button id="situ-scale-3" type="button" name="large" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="large"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>

										<div class="situvis-tree-meta-label">Semantics</div>
										<div class="panel-body idvx-SituatednessSemantics-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="situ-sem-one" type="button" name="Indexical" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Indexical"><input type="checkbox" autocomplete="off"></button>
												<button id="situ-sem-two" type="button" name="Symbolic" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Symbolic"><input type="checkbox" autocomplete="off"></button>
												<button id="situ-sem-three" type="button" name="Iconic" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Iconic"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>
							</div>
						</section>

						<section class="situvis-tree-node situvis-tree-root--data" data-tree-node>
							<button type="button" class="situvis-tree-toggle" data-tree-toggle aria-expanded="false">
								<span class="situvis-tree-label">Data</span>
							</button>
							<div class="situvis-tree-children" data-tree-children hidden>
								<section class="situvis-tree-node" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="false">
										<span class="situvis-tree-label">Data Topic</span>
									</button>
									<div class="situvis-tree-children" data-tree-children hidden>
										<div class="panel-body idvx-Topic-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="two-one" type="button" name="Society&History(include media)" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Society&History"><input type="checkbox" autocomplete="off"></button>
												<button id="two-two" type="button" name="Entertainment, Sports&Culture" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Entertainment, Sports&Culture"><input type="checkbox" autocomplete="off"></button>
												<button id="two-3" type="button" name="Environment (Surroudings/Nature), Geography&Ecology" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Environment (Surroudings/Nature), Geography&Ecology"><input type="checkbox" autocomplete="off"></button>
												<button id="two-4" type="button" name="Health, Life & Emotion" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Health, Life & Emotion"><input type="checkbox" autocomplete="off"></button>
												<button id="two-5" type="button" name="Industry, Architecture&Engineering" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Industry, Architecture&Engineering"><input type="checkbox" autocomplete="off"></button>
												<button id="two-6" type="button" name="Science" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Science"><input type="checkbox" autocomplete="off"></button>
												<button id="two-7" type="button" name="Unspecified&Mixed Topics" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Unspecified&Mixed Topics"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>

								<section class="situvis-tree-node" data-tree-node>
									<button type="button" class="situvis-tree-subtoggle" data-tree-toggle aria-expanded="false">
										<span class="situvis-tree-label">Data Origin</span>
									</button>
									<div class="situvis-tree-children" data-tree-children hidden>
										<div class="panel-body idvx-dataOrigin-panelBody situvis-tree-leaf">
											<div class="idvx-collapsed-container">
												<button id="layout-one" type="button" name="Environmental data" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Environmental data"><input type="checkbox" autocomplete="off"></button>
												<button id="layout-two" type="button" name="Participant-generated" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Participant-generated"><input type="checkbox" autocomplete="off"></button>
												<button id="layout-3" type="button" name="Collected&Uploaded" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Collected&Uploaded"><input type="checkbox" autocomplete="off"></button>
												<button id="layout-4" type="button" name="Unspecified" class="btn btn-primary idvx-collapsed-entry" aria-pressed="false" autocomplete="off" data-toggle="tooltip" title="Unspecified"><input type="checkbox" autocomplete="off"></button>
											</div>
										</div>
									</div>
								</section>
							</div>
						</section>
					</div>
				</div>
			</div>
		</aside>

		<main class="situvis-main">
			<div id="idvx-videoContainer-panel" class="situvis-main-panel">
				<div id="idvx-videoContainer" class="situvis-cards-wrap">
					<p class="text-muted">Loading…</p>
				</div>
			</div>
		</main>
	</div>
	</div>

	<!-- Guidance 页（占位；工具型预设版本保留在本地分支即可） -->
	<div id="page-guidance" class="situvis-page-wrap" style="display: none;">
		<div class="situvis-guidance-placeholder">
			<p class="text-muted">Guidance content coming soon.</p>
		</div>
	</div>

	<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="idvx-title" aria-modal="true">
			<div class="modal-dialog modal-lg situvis-modal-dialog" role="document">
				<div class="modal-content situvis-modal-content">
					<div class="modal-body clearfix situvis-modal-body">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
								aria-hidden="true">&times;</span></button>
						<div id="idvx-modalTxt" class="situvis-modal-layout">
							<div class="situvis-modal-text">
								<h6><strong id="idvx-title" class="title" style="color:#636363; font-size: large;"></strong>
								</h6>
								<div>

									<p id="idvx-User" class="modalContent"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-Topic" class="strategy"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-Presentation" class="transformation"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-Goal" class="bindingType"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-dataOrigin" class="presentationForm"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-SituatednessScale" class="layout"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-SituatednessSemantics" class="layout"
										style="color:#636363;font-size: smaller; font-family: PingFangSC;"></p>
									<p id="idvx-representationForm" class="topic"
										style="color:#636363;font-size: 14px;font-family: PingFangSC"></p>
									<p id="idvx-Description" class="description"
										style="color:#636363;font-size: smaller;font-family: PingFangSC"></p>
									<p id="idvx-Sourcelink" class="sourcelink"
										style="color:#636363;font-size: smaller;font-family: PingFangSC"></p>
									<p id="idvx-modalURL" class="modalURL"></p>
								</div>
							</div>
							<div id="idvx-modalImage" class="modalContent situvis-modal-image">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Bootstrap core JavaScript
    ================================================== -->
		<!-- Placed at the end of the document so the pages load faster -->
		<script type="text/javascript" src="js/vis.js"></script>
		<script type="text/javascript" src="js/compsvg.js"></script>
		<script src="js/p5.min.js"></script>
		<script src="js/banner-bg.js"></script>
		<script src="js/driver.js"></script>
		<script src="js/bootstrap.min.js"></script>

		<!-- IE10 viewport hack for Surface/desktop Windows 8 bug -->
		<!-- <script src="js/ie10-viewport-bug-workaround.js"></script> -->

</body>

</html>
